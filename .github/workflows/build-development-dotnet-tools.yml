---
name: "Build development-dotnet-tools base image"

# Build and push the development-dotnet-tools base image — claude-code and the
# stable, third-party (non-credfeto/funfair) .NET global tools — layered on
# top of development-python.
#
# Tags pushed:
#   :latest       what consumers resolve by default
#
# Pushes to GitHub Container Registry (ghcr.io). Auth via the workflow's
# built-in GITHUB_TOKEN — no extra secrets to manage.

on:
  schedule:
    # Hourly — the nuget-latest-versions check below decides whether anything
    # actually needs to rebuild; unchanged hours hit the GHA cache fully (only
    # a layer-validation / tag-push noop runs).
    - cron: "35 * * * *"
  workflow_run:
    workflows: ["Build development-python base image"]
    types:
      - completed
    branches:
      - "main"
  push:
    branches: ["main"]
    paths:
      - "containers/base/development-dotnet-tools/**"
      - ".github/workflows/build-development-dotnet-tools.yml"
      - ".github/actions/nuget-latest-versions/**"
      - ".github/actions/trivy-scan/**"
  pull_request:
    branches: ["main"]
    paths:
      - "containers/base/development-dotnet-tools/**"
      - ".github/workflows/build-development-dotnet-tools.yml"
      - ".github/actions/nuget-latest-versions/**"
      - ".github/actions/trivy-scan/**"
  workflow_dispatch: {}

concurrency:
  group: "build-development-dotnet-tools-${{ github.ref }}"
  cancel-in-progress: true

env:
  REGISTRY: "ghcr.io"
  IMAGE_NAME: "${{ github.repository_owner }}/development-dotnet-tools"

permissions:
  contents: "read"

jobs:
  # @@required: main
  build-development-dotnet-tools:
    name: "Build (development-dotnet-tools)"
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event != 'pull_request') }}
    runs-on: "ubuntu-latest"
    timeout-minutes: 60
    permissions:
      contents: "read"
      packages: "write"
      security-events: "write"
    steps:
      - name: "Checkout source"
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1

      # GITHUB_TOKEN is automatically provided by GitHub Actions — no secret
      # configuration required. It has packages:write permission declared above.
      - name: "Log in to GHCR"
        uses: docker/login-action@v4.4.0
        with:
          registry: "${{ env.REGISTRY }}"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4.2.0

      - name: "Resolve cache-bust value"
        id: "cb"
        uses: ./.github/actions/nuget-latest-versions
        with:
          package-ids: |
            TSQLLint
            CWM.RoslynNavigator
            dotnet-ef
            ilspycmd
            Microsoft.SqlPackage
            PowerShell
            dotnet-script

      - name: "Build and push"
        uses: docker/build-push-action@v7.3.0
        with:
          context: "containers/base/development-dotnet-tools"
          file: "containers/base/development-dotnet-tools/Dockerfile"
          pull: true
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          build-args: |
            STABLE_TOOLS_CACHE_BUST=${{ steps.cb.outputs.version-hash }}
          cache-from: "type=gha"
          cache-to: "type=gha,mode=max,ignore-error=true"

      - name: "Scan image for vulnerabilities"
        uses: ./.github/actions/trivy-scan
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

      - name: "Summarise"
        if: ${{ github.event_name != 'pull_request' }}
        shell: "bash"
        run: |
          {
            echo "## development-dotnet-tools image pushed"
            echo ""
            echo '```'
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            echo '```'
            echo ""
            echo "NuGet version hash: \`${{ steps.cb.outputs.version-hash }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Summarise (build-only, not pushed)"
        if: ${{ github.event_name == 'pull_request' }}
        shell: "bash"
        run: |
          {
            echo "## development-dotnet-tools image built (not pushed — pull_request run)"
            echo ""
            echo "Verified the Dockerfile builds; nothing was pushed to \`${{ env.REGISTRY }}\`."
          } >> "$GITHUB_STEP_SUMMARY"
