---
name: "Build development-python base image"

# Build and push the development-python base image — Python pip toolchain
# (uv, ruff, sqlfluff, cfn-lint, pre-commit-hooks) layered on top of
# development-node.
#
# Tags pushed:
#   :YYYY-MM-DD   immutable date pin
#   :latest       what consumers resolve by default
#
# Pushes to GitHub Container Registry (ghcr.io). Auth via the workflow's
# built-in GITHUB_TOKEN — no extra secrets to manage.

on:
  schedule:
    # Hourly — keeps pip package versions up to date; unchanged hours hit
    # the GHA cache fully (only a layer-validation / tag-push noop runs).
    - cron: "0 * * * *"
  push:
    branches: [main]
    paths:
      - "containers/base/development-python/Dockerfile"
      - ".github/workflows/build-development-python.yml"
  workflow_dispatch: {}

concurrency:
  group: "build-development-python-${{ github.ref }}"
  cancel-in-progress: true

env:
  REGISTRY: "ghcr.io"
  IMAGE_NAME: "${{ github.repository_owner }}/development-python"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - name: "Checkout source"
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: "Log in to GHCR"
        uses: docker/login-action@v4.2.0
        with:
          registry: "${{ env.REGISTRY }}"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4.1.0

      - name: "Resolve cache-bust values"
        id: cb
        shell: bash
        run: |
          {
            echo "date=$(date -u +%%Y-%%m-%%d)"
          } >> "$GITHUB_OUTPUT"

      - name: "Build and push"
        uses: docker/build-push-action@v7.2.0
        with:
          context: "containers/base/development-python"
          file: "containers/base/development-python/Dockerfile"
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.cb.outputs.date }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: "type=gha,mode=max"

      - name: "Summarise"
        shell: bash
        run: |
          {
            echo "## development-python image pushed"
            echo ""
            echo '```'
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.cb.outputs.date }}"
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
