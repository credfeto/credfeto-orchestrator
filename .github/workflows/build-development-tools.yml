---
name: "Build development-tools base image"

# Build and push the development-tools base image — apt packages, GitHub CLI,
# static binary linters (hadolint, dotenv-linter, sqlcmd, actionlint,
# trufflehog, composite-action-lint), and the .NET SDK.
#
# Tags pushed:
#   :latest       what consumers resolve by default
#
# Pushes to GitHub Container Registry (ghcr.io). Auth via the workflow's
# built-in GITHUB_TOKEN — no extra secrets to manage.

on:
  schedule:
    # Hourly — composite-action-lint can move multiple times a day; the
    # COMPOSITE_ACTION_LINT_CACHE_BUST is the upstream HEAD SHA, so unchanged
    # hours hit cache fully (only a layer-validation / tag-push noop runs).
    - cron: "0 * * * *"
  push:
    branches: ["main"]
    paths:
      - "containers/base/development-tools/**"
      - ".github/workflows/build-development-tools.yml"
      - ".github/actions/trivy-scan/**"
  pull_request:
    branches: ["main"]
    paths:
      - "containers/base/development-tools/**"
      - ".github/workflows/build-development-tools.yml"
      - ".github/actions/trivy-scan/**"
  workflow_dispatch: {}

concurrency:
  group: "build-development-tools-${{ github.ref }}"
  cancel-in-progress: true

env:
  REGISTRY: "ghcr.io"
  IMAGE_NAME: "${{ github.repository_owner }}/development-tools"

permissions:
  contents: "read"

jobs:
  # @@required: main
  build-development-tools:
    name: "Build (development-tools)"
    runs-on: "ubuntu-latest"
    timeout-minutes: 60
    permissions:
      contents: "read"
      packages: "write"
      security-events: "write"
    steps:
      - name: "Checkout source"
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1

      # GITHUB_TOKEN is automatically provided by GitHub Actions — no secret
      # configuration required. It has packages:write permission declared above.
      - name: "Log in to GHCR"
        uses: docker/login-action@v4.4.0
        with:
          registry: "${{ env.REGISTRY }}"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4.2.0

      - name: "Resolve cache-bust values"
        id: "cb"
        shell: "bash"
        run: |
          {
            echo "cal_sha=$(git ls-remote https://github.com/bettermarks/composite-action-lint.git HEAD | cut -f1)"
          } >> "$GITHUB_OUTPUT"

      - name: "Build and push"
        uses: docker/build-push-action@v7.3.0
        with:
          context: "containers/base/development-tools"
          file: "containers/base/development-tools/Dockerfile"
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          build-args: |
            COMPOSITE_ACTION_LINT_CACHE_BUST=${{ steps.cb.outputs.cal_sha }}
            BUILD_GIT_SHA=${{ github.sha }}
          cache-from: "type=gha"
          cache-to: "type=gha,mode=max,ignore-error=true"

      - name: "Scan image for vulnerabilities"
        uses: ./.github/actions/trivy-scan
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

      - name: "Summarise"
        if: ${{ github.event_name != 'pull_request' }}
        shell: "bash"
        run: |
          {
            echo "## development-tools image pushed"
            echo ""
            echo '```'
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            echo '```'
            echo ""
            echo "bettermarks/composite-action-lint @ \`${{ steps.cb.outputs.cal_sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Summarise (build-only, not pushed)"
        if: ${{ github.event_name == 'pull_request' }}
        shell: "bash"
        run: |
          {
            echo "## development-tools image built (not pushed — pull_request run)"
            echo ""
            echo "Verified the Dockerfile builds; nothing was pushed to \`${{ env.REGISTRY }}\`."
          } >> "$GITHUB_STEP_SUMMARY"
