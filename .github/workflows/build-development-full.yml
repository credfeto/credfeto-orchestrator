---
name: "Build development-full base image"

# Build and push the development-full base image — skill repos, Claude Code
# settings/hooks, and the credfeto global pre-commit hook chain layered on
# top of development-credfeto-tools.
#
# Tags pushed:
#   :latest       what consumers resolve by default
#
# Pushes to GitHub Container Registry (ghcr.io). Auth via the workflow's
# built-in GITHUB_TOKEN — no extra secrets to manage.
#
# Build context is containers/base/development-full because system-gitconfig
# now lives inside that folder alongside the Dockerfile.

on:
  schedule:
    # Hourly — picks up new commits from credfeto-global-pre-commit and
    # credfeto-ai-skills; unchanged hours hit the GHA cache fully (only a
    # layer-validation / tag-push noop runs).
    - cron: "45 * * * *"
  repository_dispatch:
    # Fired by credfeto-global-pre-commit on every push to main so the image
    # is rebuilt immediately when the pre-commit hook config is updated rather
    # than waiting up to an hour for the scheduled run.
    types:
      - pre-commit-updated
  workflow_run:
    workflows: ["Build development-credfeto-tools base image"]
    types:
      - completed
    branches:
      - "main"
  push:
    branches: ["main"]
    paths:
      - "containers/base/development-full/**"
      - ".github/workflows/build-development-full.yml"
      - ".github/actions/trivy-scan/**"
  pull_request:
    # No paths: filter here (unlike push above) — this workflow must always
    # run and report a status on every PR to main, since it is a required
    # status check (see .github/actions/pr-touches-paths). It skips straight
    # to a trivial success when the PR doesn't touch anything relevant.
    branches: ["main"]
  workflow_dispatch: {}

concurrency:
  group: "build-development-full-${{ github.ref }}"
  cancel-in-progress: true

env:
  REGISTRY: "ghcr.io"
  IMAGE_NAME: "${{ github.repository_owner }}/development-full"

permissions:
  contents: "read"

jobs:
  # @@required: main
  build-development-full:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event != 'pull_request') }}
    runs-on: "ubuntu-latest"
    timeout-minutes: 90
    permissions:
      contents: "read"
      packages: "write"
      pull-requests: "read"
      security-events: "write"
    steps:
      - name: "Checkout source"
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1

      - name: "Check if this image needs rebuilding"
        id: "relevance"
        uses: ./.github/actions/pr-touches-paths
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          path-prefixes: |
            containers/base/development-full/
            .github/workflows/build-development-full.yml
            .github/actions/trivy-scan/

      # GITHUB_TOKEN is automatically provided by GitHub Actions — no secret
      # configuration required. It has packages:write permission declared above.
      - name: "Log in to GHCR"
        if: ${{ steps.relevance.outputs.relevant == 'true' }}
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: "${{ env.REGISTRY }}"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Set up Docker Buildx"
        if: ${{ steps.relevance.outputs.relevant == 'true' }}
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: "Resolve cache-bust values"
        id: "cb"
        if: ${{ steps.relevance.outputs.relevant == 'true' }}
        shell: "bash"
        run: |
          {
            echo "credfeto_sha=$(git ls-remote https://github.com/credfeto/credfeto-global-pre-commit.git HEAD | cut -f1)"
            echo "credfeto_ai_skills_sha=$(git ls-remote https://github.com/credfeto/credfeto-ai-skills.git HEAD | cut -f1)"
          } >> "$GITHUB_OUTPUT"

      - name: "Build and push"
        if: ${{ steps.relevance.outputs.relevant == 'true' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: "containers/base/development-full"
          file: "containers/base/development-full/Dockerfile"
          pull: true
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          build-args: |
            CREDFETO_PRECOMMIT_CACHE_BUST=${{ steps.cb.outputs.credfeto_sha }}
            CREDFETO_AI_SKILLS_CACHE_BUST=${{ steps.cb.outputs.credfeto_ai_skills_sha }}
            BUILD_GIT_SHA=${{ github.sha }}
          cache-from: "type=gha"
          cache-to: "type=gha,mode=max,ignore-error=true"

      - name: "Scan image for vulnerabilities"
        if: ${{ steps.relevance.outputs.relevant == 'true' }}
        uses: ./.github/actions/trivy-scan
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

      - name: "Summarise"
        if: ${{ github.event_name != 'pull_request' && steps.relevance.outputs.relevant == 'true' }}
        shell: "bash"
        run: |
          {
            echo "## development-full image pushed"
            echo ""
            echo '```'
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            echo '```'
            echo ""
            echo "credfeto/credfeto-global-pre-commit @ \`${{ steps.cb.outputs.credfeto_sha }}\`"
            echo "credfeto/credfeto-ai-skills @ \`${{ steps.cb.outputs.credfeto_ai_skills_sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Summarise (build-only, not pushed)"
        if: ${{ github.event_name == 'pull_request' && steps.relevance.outputs.relevant == 'true' }}
        shell: "bash"
        run: |
          {
            echo "## development-full image built (not pushed — pull_request run)"
            echo ""
            echo "Verified the Dockerfile builds; nothing was pushed to \`${{ env.REGISTRY }}\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Summarise (skipped — no relevant changes)"
        if: ${{ steps.relevance.outputs.relevant != 'true' }}
        shell: "bash"
        run: |
          {
            echo "## development-full build skipped"
            echo ""
            echo "No changed file touched a watched path — nothing to rebuild."
          } >> "$GITHUB_STEP_SUMMARY"
