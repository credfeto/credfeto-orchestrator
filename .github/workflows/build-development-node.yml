---
name: "Build development-node base image"

# Build and push the development-node base image — Node.js v24.x, Bun runtime,
# and global npm CLIs (markdownlint-cli2, markdownlint-cli,
# stylelint, eslint, block-no-verify).
# Note: claude-code is installed via apt in the development-full stage.
#
# Tags pushed:
#   :latest       what consumers resolve by default
#
# Pushes to GitHub Container Registry (ghcr.io). Auth via the workflow's
# built-in GITHUB_TOKEN — no extra secrets to manage.

on:
  schedule:
    # Hourly at :15 (staggered after development-tools at :00) — keeps
    # node/bun/npm-package versions up to date; unchanged hours hit the GHA
    # cache fully (only a layer-validation / tag-push noop).
    - cron: "15 * * * *"
  workflow_run:
    workflows: ["Build development-tools base image"]
    types:
      - completed
    branches:
      - "main"
  push:
    branches: ["main"]
    paths:
      - "containers/base/development-node/**"
      - ".github/workflows/build-development-node.yml"
  workflow_dispatch: {}

concurrency:
  group: "build-development-node-${{ github.ref }}"
  cancel-in-progress: true

env:
  REGISTRY: "ghcr.io"
  IMAGE_NAME: "${{ github.repository_owner }}/development-node"

permissions:
  contents: "read"

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: "ubuntu-latest"
    timeout-minutes: 60
    permissions:
      contents: "read"
      packages: "write"
    steps:
      - name: "Checkout source"
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 1

      # GITHUB_TOKEN is automatically provided by GitHub Actions — no secret
      # configuration required. It has packages:write permission declared above.
      - name: "Log in to GHCR"
        uses: docker/login-action@v4.2.0
        with:
          registry: "${{ env.REGISTRY }}"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4.1.0

      - name: "Build and push"
        uses: docker/build-push-action@v7.2.0
        with:
          context: "containers/base/development-node"
          file: "containers/base/development-node/Dockerfile"
          push: true
          pull: true
          tags: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          cache-from: "type=gha"
          cache-to: "type=gha,mode=max"

      - name: "Summarise"
        shell: "bash"
        run: |
          {
            echo "## development-node image pushed"
            echo ""
            echo '```'
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
