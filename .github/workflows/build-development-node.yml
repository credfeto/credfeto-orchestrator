---
name: "Build development-node base image"

# Build and push the development-node base image — Node.js v24.x, Bun runtime,
# and global npm CLIs (markdownlint-cli2, markdownlint-cli,
# stylelint, eslint, block-no-verify).
# Note: claude-code is installed via apt in the development-full stage.
#
# Tags pushed:
#   :latest       what consumers resolve by default
#
# Pushes to GitHub Container Registry (ghcr.io). Auth via the workflow's
# built-in GITHUB_TOKEN — no extra secrets to manage.

on:
  schedule:
    # Hourly at :15 (staggered after development-tools at :00) — keeps
    # node/bun/npm-package versions up to date; unchanged hours hit the GHA
    # cache fully (only a layer-validation / tag-push noop).
    - cron: "15 * * * *"
  workflow_run:
    workflows: ["Build development-tools base image"]
    types:
      - completed
    branches:
      - "main"
  push:
    branches: ["main"]
    paths:
      - "containers/base/development-node/**"
      - ".github/workflows/build-development-node.yml"
      - ".github/actions/trivy-scan/**"
  pull_request:
    # No paths: filter here (unlike push above) — this workflow must always
    # run and report a status on every PR to main, since it is a required
    # status check (see .github/actions/pr-touches-paths). It skips straight
    # to a trivial success when the PR doesn't touch anything relevant.
    branches: ["main"]
  workflow_dispatch: {}

concurrency:
  group: "build-development-node-${{ github.ref }}"
  cancel-in-progress: true

env:
  REGISTRY: "ghcr.io"
  IMAGE_NAME: "${{ github.repository_owner }}/development-node"

permissions:
  contents: "read"

jobs:
  # @@required: main
  build-development-node:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event != 'pull_request') }}
    runs-on: "ubuntu-latest"
    timeout-minutes: 60
    permissions:
      contents: "read"
      packages: "write"
      pull-requests: "read"
      security-events: "write"
    steps:
      - name: "Checkout source"
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1

      - name: "Check if this image needs rebuilding"
        id: "relevance"
        uses: ./.github/actions/pr-touches-paths
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          path-prefixes: |
            containers/base/development-node/
            .github/workflows/build-development-node.yml
            .github/actions/trivy-scan/

      # GITHUB_TOKEN is automatically provided by GitHub Actions — no secret
      # configuration required. It has packages:write permission declared above.
      - name: "Log in to GHCR"
        if: ${{ steps.relevance.outputs.relevant == 'true' }}
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: "${{ env.REGISTRY }}"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Set up Docker Buildx"
        if: ${{ steps.relevance.outputs.relevant == 'true' }}
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: "Build and push"
        if: ${{ steps.relevance.outputs.relevant == 'true' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: "containers/base/development-node"
          file: "containers/base/development-node/Dockerfile"
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          pull: true
          tags: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          build-args: |
            BUILD_GIT_SHA=${{ github.sha }}
          cache-from: "type=gha"
          cache-to: "type=gha,mode=max,ignore-error=true"

      - name: "Scan image for vulnerabilities"
        if: ${{ steps.relevance.outputs.relevant == 'true' }}
        uses: ./.github/actions/trivy-scan
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

      - name: "Summarise"
        if: ${{ github.event_name != 'pull_request' && steps.relevance.outputs.relevant == 'true' }}
        shell: "bash"
        run: |
          {
            echo "## development-node image pushed"
            echo ""
            echo '```'
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Summarise (build-only, not pushed)"
        if: ${{ github.event_name == 'pull_request' && steps.relevance.outputs.relevant == 'true' }}
        shell: "bash"
        run: |
          {
            echo "## development-node image built (not pushed — pull_request run)"
            echo ""
            echo "Verified the Dockerfile builds; nothing was pushed to \`${{ env.REGISTRY }}\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Summarise (skipped — no relevant changes)"
        if: ${{ steps.relevance.outputs.relevant != 'true' }}
        shell: "bash"
        run: |
          {
            echo "## development-node build skipped"
            echo ""
            echo "No changed file touched a watched path — nothing to rebuild."
          } >> "$GITHUB_STEP_SUMMARY"
