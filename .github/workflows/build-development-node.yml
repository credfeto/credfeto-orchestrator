---
name: "Build development-node base image"

# Build and push the development-node base image — Node.js v24.x, Bun runtime,
# and global npm CLIs (claude-code, markdownlint-cli2, markdownlint-cli,
# stylelint, eslint, block-no-verify).
#
# Tags pushed:
#   :YYYY-MM-DD   immutable date pin
#   :latest       what consumers resolve by default
#
# Pushes to GitHub Container Registry (ghcr.io). Auth via the workflow's
# built-in GITHUB_TOKEN — no extra secrets to manage.

on:
  schedule:
    # Hourly — keeps node/bun/npm-package versions up to date; unchanged
    # hours hit the GHA cache fully (only a layer-validation / tag-push noop).
    - cron: "0 * * * *"
  push:
    branches: ["main"]
    paths:
      - "containers/base/development-node/Dockerfile"
      - ".github/workflows/build-development-node.yml"
  workflow_dispatch: {}

concurrency:
  group: "build-development-node-${{ github.ref }}"
  cancel-in-progress: true

env:
  REGISTRY: "ghcr.io"
  IMAGE_NAME: "${{ github.repository_owner }}/development-node"

permissions:
  contents: "read"

jobs:
  build:
    runs-on: "ubuntu-latest"
    timeout-minutes: 60
    permissions:
      contents: "read"
      packages: "write"
    steps:
      - name: "Checkout source"
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: "Log in to GHCR"
        uses: docker/login-action@v4.2.0
        with:
          registry: "${{ env.REGISTRY }}"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4.1.0

      - name: "Resolve cache-bust values"
        id: "cb"
        shell: "bash"
        run: |
          {
            echo "date=$(date -u +%%Y-%%m-%%d)"
          } >> "$GITHUB_OUTPUT"

      - name: "Build and push"
        uses: docker/build-push-action@v7.2.0
        with:
          context: "containers/base/development-node"
          file: "containers/base/development-node/Dockerfile"
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.cb.outputs.date }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: "type=gha"
          cache-to: "type=gha,mode=max"

      - name: "Summarise"
        shell: "bash"
        run: |
          {
            echo "## development-node image pushed"
            echo ""
            echo '```'
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.cb.outputs.date }}"
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
