--- # Test: run the bats shell test suite against the oneshot, loop, and timer scripts
name: "Test: Shell Scripts"

on:
  push:
    branches-ignore:
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shell-tests:
    runs-on: ubuntu-latest

    steps:
      - name: "Initialise Workspace"
        if: runner.environment == 'self-hosted'
        shell: bash
        run: sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE"

      - name: "Set Active Environment"
        shell: bash
        run: |
          {
            echo "ACTIVE_RUNNER_NAME=${{runner.name}}"
            echo "ACTIVE_HOSTNAME=$HOSTNAME"
            echo "ACTIVE_USER=$USER"
          } >> "$GITHUB_ENV"

      - name: "Checkout Source"
        uses: actions/checkout@v7.0.0
        with:
          clean: true
          fetch-depth: 1

      - name: "Install bats"
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bats

      - name: "Run shell tests"
        shell: bash
        run: bats test/
