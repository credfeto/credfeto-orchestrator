--- # Test: run the bats shell test suite against the oneshot, loop, and timer scripts
name: "Test: Shell Scripts"

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # @@required: main
  shell-tests:
    runs-on: ubuntu-latest

    steps:
      - name: "Initialise Workspace"
        if: runner.environment == 'self-hosted'
        shell: bash
        run: sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE"

      - name: "Set Active Environment"
        shell: bash
        run: |
          {
            echo "ACTIVE_RUNNER_NAME=${{runner.name}}"
            echo "ACTIVE_HOSTNAME=$HOSTNAME"
            echo "ACTIVE_USER=$USER"
          } >> "$GITHUB_ENV"

      - name: "Checkout Source"
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          clean: true
          fetch-depth: 1

      # shfmt is needed because the Claude Code hook scripts under test parse
      # commands with it (see containers/base/development-full/claude-hooks/)
      # and fail closed without it.
      - name: "Install bats and shfmt"
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bats shfmt

      - name: "Run shell tests"
        shell: bash
        run: bats test/
