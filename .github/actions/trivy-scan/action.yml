--- # Scan a container image for vulnerabilities and upload results to GitHub Security
name: "Scan container image for vulnerabilities"
description: "Runs Trivy against a container image, fails on unfixed CRITICAL CVEs, and uploads SARIF to GitHub Security"
inputs:
  image-ref:
    description: "Fully-qualified container image reference to scan (e.g. ghcr.io/owner/image:latest)"
    required: true

runs:
  using: "composite"
  steps:
    - name: "Scan image for vulnerabilities"
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        image-ref: "${{inputs.image-ref}}"
        format: "sarif"
        output: "trivy-results.sarif"
        severity: "CRITICAL"
        scanners: "vuln"
        ignore-unfixed: true
        limit-severities-for-sarif: true
        skip-dirs: "/home/developer/.dotnet/tools/.store"
        skip-files: "/usr/local/bin/sqlcmd,/usr/local/bin/actionlint,/opt/composite-action-lint/composite-action-lint,/usr/local/bin/trufflehog"
        exit-code: "1"

    - name: "Upload vulnerability scan results to GitHub Security"
      if: "${{ always() }}"
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        sarif_file: "trivy-results.sarif"
